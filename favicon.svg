<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Transparent background -->
  <rect width="100" height="100" fill="none"/>
  <!-- Outer bracket left -->
  <text x="2" y="78" font-family="'Segoe UI', monospace" font-size="72" font-weight="900" fill="#7c3aed" opacity="0.7">&lt;</text>
  <!-- Z letter center -->
  <text x="26" y="78" font-family="'Segoe UI', monospace" font-size="58" font-weight="900" fill="#a78bfa">Z</text>
  <!-- Outer bracket right + slash -->
  <text x="62" y="78" font-family="'Segoe UI', monospace" font-size="50" font-weight="900" fill="#7c3aed" opacity="0.7">/&gt;</text>
</svg>
